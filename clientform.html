<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code XMoRE | Client Inquiry Form</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Inter,sans-serif;
    background:#121212;
    color:white;
    min-height:100vh;
    padding-top:120px;
}

/* NAVBAR */

header{
    position:fixed;
    top:20px;
    left:0;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:1000;
}

nav{
    background:rgba(18,18,18,.75);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    padding:18px 30px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 10px 40px rgba(0,0,0,.4);
}

nav a{
    color:#d5d5d5;
    text-decoration:none;
    padding:0 18px;
    font-size:18px;
    transition:.3s;
}

nav a:hover{
    color:#F0C875;
}

/* CONTAINER */

.container{
    width:90%;
    max-width:950px;
    margin:auto;
}

.form-card{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:50px;
    backdrop-filter:blur(20px);
    box-shadow:0 20px 60px rgba(0,0,0,.4);
}

h1{
    text-align:center;
    font-size:3.5rem;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#bbbbbb;
    margin-bottom:40px;
    font-size:1.1rem;
}

/* FIELDSETS */

fieldset{
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:30px;
    margin-bottom:25px;
}

legend{
    padding:0 10px;
    color:#F0C875;
    font-weight:700;
    font-size:1.1rem;
}

/* INPUTS */

label{
    display:block;
    margin-bottom:8px;
    color:#dddddd;
}

input,
select,
textarea{
    width:100%;
    padding:15px;
    margin-bottom:18px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
    background:#1a1a1a;
    color:white;
    font-size:15px;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:#B88A44;
    box-shadow:0 0 0 3px rgba(184,138,68,.2);
}

textarea{
    resize:vertical;
}

/* CHECKBOX */

.option{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.option input{
    width:auto;
    margin:0;
}

/* BUTTONS */

.button-group{
    display:flex;
    gap:15px;
    justify-content:center;
    margin-top:20px;
}

.submit-btn{
    background:#B88A44;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    background:#F0C875;
    color:#121212;
    transform:translateY(-3px);
}

.reset-btn{
    background:#222;
    color:white;
    border:1px solid rgba(255,255,255,.1);
    padding:15px 30px;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.reset-btn:hover{
    transform:translateY(-3px);
}

/* MOBILE */

@media(max-width:768px){

    h1{
        font-size:2.3rem;
    }

    nav a{
        padding:0 8px;
        font-size:14px;
    }

    .form-card{
        padding:25px;
    }

    .button-group{
        flex-direction:column;
    }
}

</style>
</head>

<body>

<header>
<nav>
<a href="portfolio.html">Portfolio</a>
<a href="story.html">Story</a>
<a href="skills.html">Skills</a>
<a href="portfolio.html#projects">Projects</a>
<a href="clientform.html">Contact</a>
</nav>
</header>

<div class="container">

<div class="form-card">

<h1>Project Inquiry Form</h1>

<p class="subtitle">
Tell us about your project requirements.
</p>

<form action="success.html" method="get">

<fieldset>

<legend>Personal Information</legend>

<label for="fullname">Full Name</label>
<input type="text" id="fullname" name="fullname" required>

<label for="email">Email</label>
<input type="email" id="email" name="email" required>

<label for="phone">Phone Number</label>
<input type="tel" id="phone" name="phone">

<label for="company">Company Name</label>
<input type="text" id="company" name="company">

</fieldset>

<fieldset>

<legend>Project Details</legend>

<label for="projectname">Project Name</label>
<input type="text" id="projectname" name="projectname">

<label for="projecttype">Project Type</label>

<select id="projecttype" name="projecttype">
<option>Portfolio Website</option>
<option>Business Website</option>
<option>E-Commerce Store</option>
<option>Landing Page</option>
<option>Web Application</option>
</select>

<label>Required Services</label>

<div class="option">
<input type="checkbox" id="webdev">
<label for="webdev">Website Development</label>
</div>

<div class="option">
<input type="checkbox" id="seo">
<label for="seo">SEO</label>
</div>

<div class="option">
<input type="checkbox" id="smm">
<label for="smm">Social Media Marketing</label>
</div>

<div class="option">
<input type="checkbox" id="branding">
<label for="branding">Branding</label>
</div>

</fieldset>

<fieldset>

<legend>Budget & Timeline</legend>

<div class="option">
<input type="radio" name="budget">
<label>₹10,000 - ₹25,000</label>
</div>

<div class="option">
<input type="radio" name="budget">
<label>₹25,000 - ₹50,000</label>
</div>

<div class="option">
<input type="radio" name="budget">
<label>₹50,000+</label>
</div>

<label for="deadline">Expected Deadline</label>
<input type="date" id="deadline">

</fieldset>

<fieldset>

<legend>Project Description</legend>

<label for="description">
Describe your project
</label>

<textarea
id="description"
rows="8"
placeholder="Tell us about your project requirements...">
</textarea>

</fieldset>

<fieldset>

<legend>Additional Information</legend>

<label for="website">
Existing Website
</label>

<input
type="url"
id="website"
placeholder="https://example.com">

<label for="file">
Upload Reference File
</label>

<input
type="file"
id="file">

</fieldset>

<div class="button-group">

<input
class="submit-btn"
type="submit"
value="Submit Inquiry">

<input
class="reset-btn"
type="reset"
value="Clear Form">

</div>

</form>

</div>

</div>

</body>
</html>
